# Basic behavior
set -g mouse on
set -g escape-time 0
set -g history-limit 100000
set -g renumber-windows on
set -g detach-on-destroy off

# Color / terminal
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour245"
set -g status-left-style "fg=colour81,bg=colour235,bold"
set -g status-right-style "fg=colour245,bg=colour235"
set -g window-status-style "fg=colour245,bg=colour235"
set -g window-status-current-style "fg=colour235,bg=colour81,bold"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour81"
set -g message-style "fg=colour235,bg=colour81"
set -g mode-style "fg=colour235,bg=colour81"

# Index starts from 1
set -g base-index 1
setw -g pane-base-index 1

# Vi-like copy mode
setw -g mode-keys vi

# New windows and splits in current directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload Home Manager generated tmux config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Session picker
bind s choose-tree -s
